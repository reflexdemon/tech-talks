<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Talks Presentations</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.0/dist/reset.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.0/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.0/dist/theme/beige.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.0/plugin/highlight/zenburn.css">
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen&family=VT323&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <link rel="stylesheet" href="./css/custom.css">
    <link rel="stylesheet" href="./css/base.css">
</head>

<body>
    <div id="presentation-selector" class="presentation-list" style="display: none;">
        <header class="hero-section" style="margin: -50px -50px 30px -50px; border-radius: 0 0 24px 24px;">
            <h1 class="hero-title">Tech Talks</h1>
        </header>

        <div class="table-container">
            <table class="table">
                <thead>
                    <tr>
                        <th width="10%">#</th>
                        <th width="65%">Topic</th>
                        <th width="25%">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td class="topic-cell">Java 11 ➡ 17</td>
                        <td><a href="?presentation=java-11-to-17" class="link-btn">View Presentation</a></td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td class="topic-cell">OpenSpec (WIP)</td>
                        <td><a href="?presentation=openspec" class="link-btn">View Presentation</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="reveal" id="reveal-container" style="display: none;">
        <div class="slides" id="slides-container">
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const presentationName = params.get('presentation');

        if (!presentationName) {
            document.getElementById('presentation-selector').style.display = 'block';
        } else {
            document.getElementById('reveal-container').style.display = 'block';
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.0.0/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.0.0/plugin/notes/notes.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.0.0/plugin/markdown/markdown.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.0.0/plugin/highlight/highlight.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="./plugin/mermaid/plugin.js"></script>
    <script src="./plugin/spotlight/spotlight.js"></script>
    <!-- Presentation logic handled by the webpack bundle (js/presentation.js) -->
</body>

</html>

<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#020202" />
            <stop offset="100%" stop-color="#0d0d0d" />
        </linearGradient>
        <linearGradient id="wave1" x1="0%" y1="20%" x2="100%" y2="80%">
            <stop offset="0%" stop-color="#333333" stop-opacity="0.7" />
            <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0.1" />
        </linearGradient>
        <linearGradient id="wave2" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#4a4a4a" stop-opacity="0.5" />
            <stop offset="100%" stop-color="#000000" stop-opacity="0.9" />
        </linearGradient>
        <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="60" />
        </filter>
        <filter id="blur-light" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="20" />
        </filter>
    </defs>
    
    <rect width="100%" height="100%" fill="url(#bg)" />
    
    <!-- Large sweeping background waves -->
    <path d="M-200,800 C400,-100 1200,1400 2120,300 L2120,1280 L-200,1280 Z" fill="url(#wave1)" filter="url(#blur)" />
    <path d="M-200,300 C700,1000 1100,-300 2120,700 L2120,-200 L-200,-200 Z" fill="url(#wave2)" filter="url(#blur)" />
    
    <!-- Defined ribbon highlights (silver/grey) -->
    <path d="M-200,750 C500,100 1100,1300 2120,350" fill="none" stroke="#666" stroke-width="20" filter="url(#blur-light)" opacity="0.4"/>
    <path d="M-200,350 C700,950 1200,-100 2120,650" fill="none" stroke="#888" stroke-width="8" filter="url(#blur-light)" opacity="0.3"/>
</svg>
